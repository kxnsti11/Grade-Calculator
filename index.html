<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grade Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg: #0f0f1a;
      --card: #1a1a2e;
      --border: #2a2a45;
      --accent: #7c6af7;
      --accent2: #a78bfa;
      --text: #e8e8f0;
      --muted: #7070a0;
      --green: #4ade80;
      --yellow: #facc15;
      --red: #f87171;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "DM Sans", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header h1 {
      font-family: "Playfair Display", serif;
      font-size: 2.8rem;
      background: linear-gradient(135deg, #7c6af7, #a78bfa, #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    header p {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
    }

    /* Input card */
    .input-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      margin-bottom: 24px;
    }

    .input-card h2 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr 120px auto;
      gap: 12px;
      align-items: center;
    }

    input[type="text"],
    input[type="number"] {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text);
      font-family: "DM Sans", sans-serif;
      font-size: 0.95rem;
      width: 100%;
      transition: border-color 0.2s;
      outline: none;
    }

    input[type="text"]:focus,
    input[type="number"]:focus {
      border-color: var(--accent);
    }

    input::placeholder { color: var(--muted); }

    .add-btn {
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: "DM Sans", sans-serif;
      font-size: 1.4rem;
      font-weight: 300;
      width: 46px;
      height: 46px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .add-btn:hover {
      background: var(--accent2);
      transform: scale(1.08);
    }

    /* Grades list */
    .grades-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      margin-bottom: 24px;
      display: none;
    }

    .grades-card h2 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .grade-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .grade-item:last-child { border-bottom: none; }

    .grade-subject {
      font-size: 0.95rem;
      color: var(--text);
    }

    .grade-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .grade-badge {
      font-family: "Playfair Display", serif;
      font-size: 1.1rem;
      font-weight: 700;
      min-width: 40px;
      text-align: right;
    }

    .delete-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.2s;
      line-height: 1;
    }

    .delete-btn:hover { color: var(--red); }

    /* Result card */
    .result-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 32px;
      text-align: center;
      display: none;
      position: relative;
      overflow: hidden;
    }

    .result-card::before {
      content: '';
      position: absolute;
      width: 300px; height: 300px;
      border-radius: 50%;
      top: -120px; right: -80px;
      opacity: 0.06;
      background: var(--accent);
    }

    .result-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .result-number {
      font-family: "Playfair Display", serif;
      font-size: 5rem;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 12px;
      transition: color 0.4s;
    }

    .result-grade {
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .result-sub {
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* Clear button */
    .clear-btn {
      display: block;
      margin: 20px auto 0;
      background: none;
      border: 1px solid var(--border);
      border-radius: 50px;
      color: var(--muted);
      font-family: "DM Sans", sans-serif;
      font-size: 0.85rem;
      padding: 8px 24px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .clear-btn:hover {
      border-color: var(--red);
      color: var(--red);
    }

    .empty-state {
      color: var(--muted);
      font-size: 0.9rem;
      text-align: center;
      padding: 20px 0 4px;
    }

    @media (max-width: 480px) {
      .input-row { grid-template-columns: 1fr 90px auto; }
      header h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>

  <header>
    <h1>Grade Calculator</h1>
    <p>Add your subjects and grades to see your average.</p>
  </header>

  <div class="container">

    <!-- Input -->
    <div class="input-card">
      <h2>Add a Subject</h2>
      <div class="input-row">
        <input type="text" id="subjectInput" placeholder="e.g. Mathematics" />
        <input type="number" id="gradeInput" placeholder="Grade" min="0" max="100" />
        <button class="add-btn" onclick="addGrade()" title="Add">+</button>
      </div>
    </div>

    <!-- Grades list -->
    <div class="grades-card" id="gradesCard">
      <h2>Your Grades</h2>
      <div id="gradesList"></div>
      <button class="clear-btn" onclick="clearAll()">Clear all</button>
    </div>

    <!-- Result -->
    <div class="result-card" id="resultCard">
      <div class="result-label">Your Average</div>
      <div class="result-number" id="resultNumber">—</div>
      <div class="result-grade" id="resultGrade"></div>
      <div class="result-sub" id="resultSub"></div>
    </div>

  </div>

  <script>
    const grades = [];

    function addGrade() {
      const subject = document.getElementById("subjectInput").value.trim();
      const grade   = parseFloat(document.getElementById("gradeInput").value);

      if (!subject) {
        alert("Please enter a subject name.");
        return;
      }
      if (isNaN(grade) || grade < 0 || grade > 100) {
        alert("Please enter a grade between 0 and 100.");
        return;
      }

      grades.push({ subject, grade });
      document.getElementById("subjectInput").value = "";
      document.getElementById("gradeInput").value   = "";
      document.getElementById("subjectInput").focus();

      render();
    }

    function deleteGrade(index) {
      grades.splice(index, 1);
      render();
    }

    function clearAll() {
      grades.length = 0;
      render();
    }

    function gradeColor(g) {
      if (g >= 85) return "var(--green)";
      if (g >= 60) return "var(--yellow)";
      return "var(--red)";
    }

    function gradeLabel(g) {
      if (g >= 90) return { letter: "A  · Excellent",   sub: "Outstanding performance!" };
      if (g >= 80) return { letter: "B  · Good",        sub: "Great work, keep it up." };
      if (g >= 70) return { letter: "C  · Satisfactory",sub: "Solid, but room to grow." };
      if (g >= 60) return { letter: "D  · Passing",     sub: "You passed — aim higher!" };
      return              { letter: "F  · Failing",     sub: "Don't give up — you can do it." };
    }

    function render() {
      const list      = document.getElementById("gradesList");
      const gradesCard= document.getElementById("gradesCard");
      const resultCard= document.getElementById("resultCard");

      list.innerHTML = "";

      if (grades.length === 0) {
        gradesCard.style.display  = "none";
        resultCard.style.display  = "none";
        return;
      }

      gradesCard.style.display = "block";
      resultCard.style.display = "block";

      grades.forEach((item, i) => {
        const color = gradeColor(item.grade);
        const div = document.createElement("div");
        div.className = "grade-item";
        div.innerHTML = `
          <span class="grade-subject">${item.subject}</span>
          <div class="grade-right">
            <span class="grade-badge" style="color:${color}">${item.grade}</span>
            <button class="delete-btn" onclick="deleteGrade(${i})" title="Remove">✕</button>
          </div>`;
        list.appendChild(div);
      });

      const avg   = grades.reduce((sum, g) => sum + g.grade, 0) / grades.length;
      const color = gradeColor(avg);
      const info  = gradeLabel(avg);

      document.getElementById("resultNumber").textContent = avg.toFixed(1);
      document.getElementById("resultNumber").style.color = color;
      document.getElementById("resultGrade").textContent  = info.letter;
      document.getElementById("resultGrade").style.color  = color;
      document.getElementById("resultSub").textContent    =
        `Based on ${grades.length} subject${grades.length > 1 ? "s" : ""} · ${info.sub}`;
    }

    // Allow pressing Enter to add a grade
    document.addEventListener("keydown", e => {
      if (e.key === "Enter") addGrade();
    });
  </script>

</body>
</html>
