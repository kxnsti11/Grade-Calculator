<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grade Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --bg: #0f0f1a;
      --card: #1a1a2e;
      --border: #2a2a45;
      --accent: #7c6af7;
      --accent2: #a78bfa;
      --text: #e8e8f0;
      --muted: #7070a0;
      --green: #4ade80;
      --yellow: #facc15;
      --orange: #fb923c;
      --red: #f87171;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "DM Sans", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    header h1 {
      font-family: "Playfair Display", serif;
      font-size: 2.8rem;
      background: linear-gradient(135deg, #7c6af7, #a78bfa, #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    header p {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .container {
      max-width: 640px;
      margin: 0 auto;
    }

    .input-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      margin-bottom: 24px;
    }

    .input-card h2 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .input-row {
      display: grid;
      grid-template-columns: 1fr 120px auto;
      gap: 12px;
      align-items: center;
    }

    input[type="text"],
    select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text);
      font-family: "DM Sans", sans-serif;
      font-size: 0.95rem;
      width: 100%;
      transition: border-color 0.2s;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
    }

    input[type="text"]:focus,
    select:focus {
      border-color: var(--accent);
    }

    input::placeholder { color: var(--muted); }

    /* Custom select wrapper */
    .select-wrapper {
      position: relative;
    }

    .select-wrapper::after {
      content: '▾';
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      font-size: 0.85rem;
    }

    select option {
      background: #1a1a2e;
      color: var(--text);
    }

    .add-btn {
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-family: "DM Sans", sans-serif;
      font-size: 1.4rem;
      font-weight: 300;
      width: 46px;
      height: 46px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .add-btn:hover {
      background: var(--accent2);
      transform: scale(1.08);
    }

    /* Legend */
    .legend {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      margin-top: 20px;
    }

    .legend-item {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 4px;
      text-align: center;
    }

    .legend-num {
      font-family: "Playfair Display", serif;
      font-size: 1.2rem;
      font-weight: 700;
      display: block;
    }

    .legend-label {
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 2px;
      line-height: 1.3;
    }

    /* Grades list */
    .grades-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      margin-bottom: 24px;
      display: none;
    }

    .grades-card h2 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .grade-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .grade-item:last-child { border-bottom: none; }

    .grade-subject {
      font-size: 0.95rem;
      color: var(--text);
    }

    .grade-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .grade-badge {
      font-family: "Playfair Display", serif;
      font-size: 1.3rem;
      font-weight: 700;
      min-width: 24px;
      text-align: right;
    }

    .grade-label-small {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .delete-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.2s;
      line-height: 1;
    }

    .delete-btn:hover { color: var(--red); }

    /* Result card */
    .result-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 32px;
      text-align: center;
      display: none;
      position: relative;
      overflow: hidden;
    }

    .result-card::before {
      content: '';
      position: absolute;
      width: 300px; height: 300px;
      border-radius: 50%;
      top: -120px; right: -80px;
      opacity: 0.06;
      background: var(--accent);
    }

    .result-label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .result-number {
      font-family: "Playfair Display", serif;
      font-size: 6rem;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 12px;
      transition: color 0.4s;
    }

    .result-grade {
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .result-sub {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .clear-btn {
      display: block;
      margin: 20px auto 0;
      background: none;
      border: 1px solid var(--border);
      border-radius: 50px;
      color: var(--muted);
      font-family: "DM Sans", sans-serif;
      font-size: 0.85rem;
      padding: 8px 24px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .clear-btn:hover {
      border-color: var(--red);
      color: var(--red);
    }

    @media (max-width: 480px) {
      .input-row { grid-template-columns: 1fr 100px auto; }
      header h1 { font-size: 2rem; }
      .legend { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>

  <header>
    <h1>Notenrechner</h1>
    <p>Trag deine Fächer und Noten ein — wir berechnen deinen Durchschnitt.</p>
  </header>

  <div class="container">

    <!-- Input -->
    <div class="input-card">
      <h2>Fach hinzufügen</h2>
      <div class="input-row">
        <input type="text" id="subjectInput" placeholder="z.B. Mathematik" />
        <div class="select-wrapper">
          <select id="gradeInput">
            <option value="1">1</option>
            <option value="2" selected>2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
          </select>
        </div>
        <button class="add-btn" onclick="addGrade()" title="Hinzufügen">+</button>
      </div>

      <!-- Legend -->
      <div class="legend">
        <div class="legend-item">
          <span class="legend-num" style="color:#4ade80">1</span>
          <div class="legend-label">Sehr gut</div>
        </div>
        <div class="legend-item">
          <span class="legend-num" style="color:#a3e635">2</span>
          <div class="legend-label">Gut</div>
        </div>
        <div class="legend-item">
          <span class="legend-num" style="color:#facc15">3</span>
          <div class="legend-label">Befriedigend</div>
        </div>
        <div class="legend-item">
          <span class="legend-num" style="color:#fb923c">4</span>
          <div class="legend-label">Ausreichend</div>
        </div>
        <div class="legend-item">
          <span class="legend-num" style="color:#f87171">5</span>
          <div class="legend-label">Mangelhaft</div>
        </div>
        <div class="legend-item">
          <span class="legend-num" style="color:#dc2626">6</span>
          <div class="legend-label">Ungenügend</div>
        </div>
      </div>
    </div>

    <!-- Grades list -->
    <div class="grades-card" id="gradesCard">
      <h2>Deine Noten</h2>
      <div id="gradesList"></div>
      <button class="clear-btn" onclick="clearAll()">Alle löschen</button>
    </div>

    <!-- Result -->
    <div class="result-card" id="resultCard">
      <div class="result-label">Dein Durchschnitt</div>
      <div class="result-number" id="resultNumber">—</div>
      <div class="result-grade" id="resultGrade"></div>
      <div class="result-sub" id="resultSub"></div>
    </div>

  </div>

  <script>
    const grades = [];

    const gradeInfo = {
      1: { label: "Sehr gut",      color: "#4ade80" },
      2: { label: "Gut",           color: "#a3e635" },
      3: { label: "Befriedigend",  color: "#facc15" },
      4: { label: "Ausreichend",   color: "#fb923c" },
      5: { label: "Mangelhaft",    color: "#f87171" },
      6: { label: "Ungenügend",    color: "#dc2626" },
    };

    function gradeColor(avg) {
      if (avg <= 1.5) return gradeInfo[1].color;
      if (avg <= 2.5) return gradeInfo[2].color;
      if (avg <= 3.5) return gradeInfo[3].color;
      if (avg <= 4.5) return gradeInfo[4].color;
      if (avg <= 5.5) return gradeInfo[5].color;
      return gradeInfo[6].color;
    }

    function gradeLabel(avg) {
      if (avg <= 1.5) return gradeInfo[1].label;
      if (avg <= 2.5) return gradeInfo[2].label;
      if (avg <= 3.5) return gradeInfo[3].label;
      if (avg <= 4.5) return gradeInfo[4].label;
      if (avg <= 5.5) return gradeInfo[5].label;
      return gradeInfo[6].label;
    }

    function addGrade() {
      const subject = document.getElementById("subjectInput").value.trim();
      const grade   = parseInt(document.getElementById("gradeInput").value);

      if (!subject) {
        alert("Bitte gib einen Fachnamen ein.");
        return;
      }

      grades.push({ subject, grade });
      document.getElementById("subjectInput").value = "";
      document.getElementById("gradeInput").value   = "2";
      document.getElementById("subjectInput").focus();

      render();
    }

    function deleteGrade(index) {
      grades.splice(index, 1);
      render();
    }

    function clearAll() {
      grades.length = 0;
      render();
    }

    function render() {
      const list       = document.getElementById("gradesList");
      const gradesCard = document.getElementById("gradesCard");
      const resultCard = document.getElementById("resultCard");

      list.innerHTML = "";

      if (grades.length === 0) {
        gradesCard.style.display = "none";
        resultCard.style.display = "none";
        return;
      }

      gradesCard.style.display = "block";
      resultCard.style.display = "block";

      grades.forEach((item, i) => {
        const info = gradeInfo[item.grade];
        const div  = document.createElement("div");
        div.className = "grade-item";
        div.innerHTML = `
          <span class="grade-subject">${item.subject}</span>
          <div class="grade-right">
            <span class="grade-label-small" style="color:${info.color}">${info.label}</span>
            <span class="grade-badge" style="color:${info.color}">${item.grade}</span>
            <button class="delete-btn" onclick="deleteGrade(${i})" title="Entfernen">✕</button>
          </div>`;
        list.appendChild(div);
      });

      const avg    = grades.reduce((sum, g) => sum + g.grade, 0) / grades.length;
      const color  = gradeColor(avg);
      const label  = gradeLabel(avg);

      document.getElementById("resultNumber").textContent = avg.toFixed(2);
      document.getElementById("resultNumber").style.color = color;
      document.getElementById("resultGrade").textContent  = label;
      document.getElementById("resultGrade").style.color  = color;
      document.getElementById("resultSub").textContent    =
        `Basierend auf ${grades.length} Fach${grades.length > 1 ? "fächern" : ""}`;
    }

    document.addEventListener("keydown", e => {
      if (e.key === "Enter") addGrade();
    });
  </script>

</body>
</html>
